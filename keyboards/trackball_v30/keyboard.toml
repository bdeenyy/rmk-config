[keyboard]
name = "Ergohaven Trackball Mini v3.0"
product_name = "Trackball Mini"
vendor_id = 0xE126
product_id = 0x00C1
manufacturer = "Ergohaven"
chip = "nrf52840"

[host]
vial_enabled = true
unlock_keys = [[0, 0], [0, 1]]

[layout]
rows = 2
cols = 2
matrix_map = """
(0,0) (0,1)
(1,0) (1,1)
"""
layers = 4

# Row 0: physical top buttons, Row 1: virtual BT keys (P0_01/P0_00 not populated on v3.0)
[[layer]]
name = "Mouse"
keys = """
MouseBtn1  User12
User0      User3
"""

[[layer]]
name = "Scroll"
keys = """
_  _
User0  User3
"""

[[layer]]
name = "Sniper"
keys = """
_  _
User0  User3
"""

[[layer]]
name = "Adjust"
keys = """
User0  User3
User5  User6
"""

[ble]
enabled = true
battery_adc_pin = "P0_31"
adc_divider_measured = 782
adc_divider_total = 1185

[matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["P0_28", "P0_03"],
    ["P0_01", "P0_00"]
]

[[input_device.pmw3610]]
name = "trackball0"
spi.instance = "bitbang0"
spi.sck = "P0_08"
spi.mosi = "P0_17"
spi.miso = "P0_17"
spi.cs = "P0_13"
motion = "P0_15"
cpi = 1000
swap_xy = true
invert_x = false
invert_y = false

[storage]
clear_storage = false

[workspace]
members = ["."]
